<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
     
     function Counter(){
         //3a,3b,3c
        let [count,setCount] = React.useState(0)
        function Count(){
            setCount((prev)=>prev+1)
        }  

        return (
            <>
              {count === 1 ? (
                <button onClick={Count}> Clicked {count} time</button>
              ): (<button onClick={Count}> Clicked {count} times</button>)}
            </>
        )
      }

     //3d,3e,3f
     function Counter1({count,setCount}){
        
        function Count(){
            setCount((prev)=>prev+1)
        }
        return (
            <>
              {count === 1 ? (
                <button onClick={Count}> Clicked {count} time</button>
              ): (<button onClick={Count}> Clicked {count} times</button>)}
            </>
        )
     }
     function Counter2({count,setCount}){
       
        function Count(){
            setCount(count+1)
        }
        return (
            <>
             {count === 1 ? (
                <button onClick={Count}> Clicked {count} time</button>
              ): (<button onClick={Count}> Clicked {count} times</button>)}
            </>
        )
     }
      
      
     //3g
     function Events(){
        const [inputText,setInputText] = React.useState('')
        function Text(event){
        //   console.log(event.target.value)
           setInputText(event.target.value)
        }
        return (
            <>
              <input onChange={Text} />
              <p>Hello {inputText}</p>
            </>
        )
     }

     //3h
     function Events1(){
        const [inputText,setInputText] = React.useState('')
        function Text(event){
        //   console.log(event.target.value)
           setInputText(event.target.value)
        }

        function ResetButton(){
            setInputText('')
        }
        function ExampleButton(){
            setInputText("Alice")
        }
        
        return (
            <>
              <input placeholder = "Type your name" onChange={Text} value={inputText} />
              <button onClick={ResetButton}>Reset</button>
              <button onClick={ExampleButton}>Example</button>
              <p>Hello {inputText}</p>
            </>
        )
     }


      function App(){
         let [count,setCount] = React.useState(0)
         function ResetButton(){
            setCount(0)
         }
        return (
            <>
              <Counter/>
              <br/>
              <Counter1 count = {count} setCount={setCount}/>
              <Counter2 count = {count} setCount={setCount}/>
              <button onClick={ResetButton}>Reset</button>
              <br/><br/>
              <Events/>
              <br/>
              <br/>
              <Events1/>

            </>
        )
      }
      
      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container)
      root.render(<App/>);
    </script>
  </body>
</html>
