<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
    
    function Product({product,price,discountPrice,imgSrc}){
       return (
         <div>
                     <img src={imgSrc} width="50"/>
                     <p>Cotton {product}</p>
                     {discountPrice ?
                        (
                             <>
                             <del><p>Price : ${price}</p></del>
                             <p>discountPrice :${discountPrice}</p>
                             </>
                        ):(
                            <>
                            <p>Price : ${price}</p>
                            </>
                       )}
                     <button>Add to cart</button>
                   </div>
       )
    }

    function ProductDetails({product,price,discountPrice,imgSrc}){
        return (
            <> 
               {product ==="socks" && (
                   <>
                     <Product  product = {product} price = {price}  discountPrice={discountPrice} imgSrc ={imgSrc} />
                   </>
                 )}  
               <br/>
               {product ==="t-shirt" &&  (
                  <>
                     <Product product = {product} price = {price}  discountPrice={discountPrice} imgSrc ={imgSrc} />
                   </>
                 )}
                 <br/>
               {product ==="tennis-ball" &&  (
                  <>
                     <Product product = {product}  price = {price}  discountPrice={discountPrice} imgSrc ={imgSrc} />
                   </>
                )}
            </>
        )
    }
     
     function App(){
        return (
            <> 
              <ProductDetails product ="socks" price = "10" imgSrc= "./cotton-socks.png"/>
              <ProductDetails product ="t-shirt" price = "15"  discountPrice = "5.45"  imgSrc= "./plain-t-shirt.png"/>
              <ProductDetails product ="tennis-ball" price = "20" imgSrc="./tennis-balls.png"/>
            </>
        )
     }
      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container)
      root.render(<App/>);
    </script>
  </body>
</html>
